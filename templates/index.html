<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Journal</title>
    <link rel="stylesheet" href="/styles">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">
        <div class="todo-card">
            <h1 class="page-title">Todo Journal</h1>

            <!-- Add Todo Form -->

            <form class="row g-3 mb-5" action="/add-todo" method="POST">
                <div class="col-md-9">
                    <input type="text" class="form-control" placeholder="Write a new todo..." name="title">
                </div>

                <div class="col-md-3 d-grid">
                    <input type="submit" class="btn btn-dark" value="Add Todo">
                </div>
            </form>

            <!-- Todo Table -->
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Todo</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        {{todos}}
                    </tbody>
                </table>
            </div>
        </div>
    </div>


    <!-- Update Modal -->

    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="updateTodoForm" action="/update-todo" method="POST">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            Update Todo
                        </h5>
                        <button class="btn-close" data-bs-dismiss="modal" type="button">
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">
                                Todo
                            </label>
                            <input id="updateTask" name="title" type="text" class="form-control" value="">
                            <input id="updateId" name="id" type="hidden" value="">
                        </div>
                        <div>
                            <label class="form-label">
                                Status
                            </label>
                            <select id="updateStatus" name="completed" class="form-select">
                                <option value="false">Pending</option>
                                <option value="true">Done</option>
                            </select>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-outline-dark" data-bs-dismiss="modal" type="button">
                            Cancel
                        </button>

                        <button type="submit" class="btn btn-dark" id="saveChangesBtn">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const updateModal = document.getElementById('updateModal');
            const updateTaskInput = document.getElementById('updateTask');
            const updateStatusSelect = document.getElementById('updateStatus');
            const updateIdInput = document.getElementById('updateId');

            document.querySelectorAll('button[data-bs-target="#updateModal"]').forEach(button => {
                button.addEventListener('click', () => {
                    updateTaskInput.value = button.dataset.title || '';
                    updateStatusSelect.value = button.dataset.completed === 'true' ? 'Done' : 'Pending';
                    updateIdInput.value = button.dataset.id || '';
                });
            });
        });
    </script>

</body>

</html>
